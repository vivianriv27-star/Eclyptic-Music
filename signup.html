<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<style>
body{
background:#050505;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#111;
padding:40px;
border-radius:15px;
width:350px;
}
input{
width:100%;
padding:12px;
margin:10px 0;
background:#222;
border:none;
color:white;
}
button{
width:100%;
padding:12px;
background:#4da6ff;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
}
</style>
</head>
<body>
<div class="box">
<h2>Create Account</h2>
<input type="text" placeholder="Username">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button>Create Account</button>
</div>
</body>
</html>
